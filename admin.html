<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>王者农场助手 · 管理后台</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>" />
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./common.js?v=7"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<style>[x-cloak]{display:none!important}</style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800">

<div x-data="admin()" x-cloak class="max-w-5xl mx-auto p-4">

  <header class="flex items-center justify-between mb-4">
    <h1 class="text-xl font-bold">📊 农场管理后台</h1>
    <template x-if="authed">
      <div class="flex items-center gap-2 text-sm">
        <button @click="loadAll()" class="text-emerald-600 hover:text-emerald-700">🔄 刷新</button>
        <button @click="logout()" class="text-red-500 hover:text-red-700">登出</button>
      </div>
    </template>
  </header>

  <!-- Login -->
  <template x-if="!authed">
    <div class="bg-white rounded-xl shadow p-6 max-w-sm mx-auto space-y-3">
      <h2 class="font-semibold text-center">管理员登录</h2>
      <input x-model="loginForm.nickname" placeholder="管理员昵称"
        class="w-full border rounded px-3 py-2" />
      <input x-model="loginForm.pin" type="password" inputmode="numeric" maxlength="4"
        placeholder="PIN"
        class="w-full border rounded px-3 py-2" />
      <button @click="login()" :disabled="loading"
        class="w-full bg-slate-800 hover:bg-slate-900 text-white rounded py-2 font-semibold disabled:opacity-50">
        <span x-text="loading ? '...' : '进入'"></span>
      </button>
      <p x-show="loginErr" class="text-red-500 text-sm text-center" x-text="loginErr"></p>
    </div>
  </template>

  <!-- Dashboard -->
  <template x-if="authed">
    <div class="space-y-4">

      <!-- 汇总 -->
      <div class="bg-white rounded-xl shadow p-4 grid grid-cols-4 gap-2 text-center">
        <div>
          <div class="text-2xl font-bold" x-text="users.length"></div>
          <div class="text-xs text-slate-500">👥 用户数</div>
        </div>
        <div>
          <div class="text-2xl font-bold" x-text="crops.length"></div>
          <div class="text-xs text-slate-500">🌱 作物总数</div>
        </div>
        <div>
          <div class="text-2xl font-bold text-amber-600" x-text="collections.length"></div>
          <div class="text-xs text-slate-500">🏆 纪念册</div>
        </div>
        <div>
          <div class="text-2xl font-bold text-sky-600" x-text="publicCollections.length"></div>
          <div class="text-xs text-slate-500">👥 朋友圈</div>
        </div>
      </div>

      <!-- Tab 切换 -->
      <div class="flex items-center gap-2 text-sm">
        <button @click="tab='crops'"
          :class="tab==='crops' ? 'bg-slate-800 text-white' : 'bg-white text-slate-600'"
          class="px-4 py-1.5 rounded-full shadow-sm font-semibold">🌱 作物</button>
        <button @click="tab='collections'"
          :class="tab==='collections' ? 'bg-amber-600 text-white' : 'bg-white text-slate-600'"
          class="px-4 py-1.5 rounded-full shadow-sm font-semibold">🏆 纪念册</button>
        <button @click="tab='feed'"
          :class="tab==='feed' ? 'bg-sky-600 text-white' : 'bg-white text-slate-600'"
          class="px-4 py-1.5 rounded-full shadow-sm font-semibold">👥 朋友圈</button>
        <button @click="tab='review'"
          :class="tab==='review' ? 'bg-rose-600 text-white' : 'bg-white text-slate-600'"
          class="relative px-4 py-1.5 rounded-full shadow-sm font-semibold">
          🔍 审查
          <template x-if="unreviewedCount > 0">
            <span class="ml-1 inline-flex items-center justify-center text-[10px] rounded-full w-5 h-5"
              :class="tab==='review' ? 'bg-white text-rose-600' : 'bg-rose-500 text-white'"
              x-text="unreviewedCount"></span>
          </template>
        </button>
      </div>

      <!-- ============ TAB: 作物 ============ -->
      <template x-if="tab === 'crops'">
        <div class="space-y-4">
          <!-- 作物筛选 -->
          <div class="flex items-center gap-2 text-sm">
            <span class="text-slate-500">筛选：</span>
            <button @click="cropFilter='all'"
              :class="cropFilter==='all' ? 'bg-slate-800 text-white' : 'bg-white text-slate-600'"
              class="px-3 py-1 rounded-full shadow-sm">全部</button>
            <button @click="cropFilter='active'"
              :class="cropFilter==='active' ? 'bg-emerald-600 text-white' : 'bg-white text-slate-600'"
              class="px-3 py-1 rounded-full shadow-sm">活动中</button>
            <button @click="cropFilter='mature'"
              :class="cropFilter==='mature' ? 'bg-amber-600 text-white' : 'bg-white text-slate-600'"
              class="px-3 py-1 rounded-full shadow-sm">待收获</button>
            <button @click="cropFilter='harvested'"
              :class="cropFilter==='harvested' ? 'bg-slate-500 text-white' : 'bg-white text-slate-600'"
              class="px-3 py-1 rounded-full shadow-sm">已收获</button>
          </div>

          <template x-for="u in usersSorted" :key="u.nickname">
            <div class="bg-white rounded-xl shadow">
              <div class="px-4 py-3 border-b flex items-center justify-between flex-wrap gap-2">
                <div>
                  <span class="font-bold" x-text="u.nickname"></span>
                  <template x-if="u.banned">
                    <span class="ml-2 text-xs px-2 py-0.5 rounded bg-red-100 text-red-700">已封</span>
                  </template>
                  <span class="text-xs text-slate-500 ml-2" x-text="'注册于 ' + formatDateTime(u.created_at)"></span>
                </div>
                <div class="flex items-center gap-3 text-xs">
                  <span class="text-slate-500">
                    <span x-text="cropCountFor(u.nickname, 'active') + ' 活动 · '"></span>
                    <span x-text="cropCountFor(u.nickname, 'mature') + ' 待收 · '"></span>
                    <span x-text="cropCountFor(u.nickname, 'harvested') + ' 已收'"></span>
                  </span>
                  <!-- 管理员自己不显示封号 / 删号按钮；重置 PIN 对所有用户（含 admin）都可用 -->
                  <div class="flex items-center gap-2">
                    <button @click="askResetPin(u)"
                      class="text-sky-600 hover:text-sky-700 font-semibold">🔑 重置 PIN</button>
                    <template x-if="u.nickname !== ADMIN_NICKNAME">
                      <button @click="askBan(u)"
                        :class="u.banned ? 'text-emerald-600 hover:text-emerald-700' : 'text-red-500 hover:text-red-700'"
                        x-text="u.banned ? '🔓 解封' : '🚫 封号'"
                        class="font-semibold"></button>
                    </template>
                    <template x-if="u.nickname !== ADMIN_NICKNAME">
                      <button @click="askDeleteUser(u)"
                        class="text-red-700 hover:text-red-900 font-semibold">💣 删号</button>
                    </template>
                  </div>
                </div>
              </div>
              <div class="divide-y">
                <template x-for="c in filteredCropsFor(u.nickname)" :key="c.id">
                  <div class="px-4 py-2.5 text-sm flex items-center gap-3">
                    <span class="text-xl" x-text="{8:'🌾',16:'🌽',32:'🫐'}[c.type]"></span>
                    <div class="flex-1 min-w-0">
                      <div class="font-medium">
                        <span x-text="c.type + 'h'"></span>
                        <template x-if="c.name">
                          <span class="ml-1" x-text="'· ' + c.name"></span>
                        </template>
                        <span class="ml-2 text-xs px-1.5 py-0.5 rounded"
                          :class="cropBadgeClass(c)" x-text="cropStatusLabel(c)"></span>
                      </div>
                      <div class="text-xs text-slate-500 mt-0.5">
                        种于 <span x-text="formatDateTime(c.planted_at)"></span>
                        · 已浇 <span x-text="(c.water_events||[]).length"></span> 次
                        <template x-if="!c.harvested_at">
                          <span>· 预计 <span x-text="formatDateTime(computeMatTime(c))"></span></span>
                        </template>
                        <template x-if="c.harvested_at">
                          <span>· 收于 <span x-text="formatDateTime(c.harvested_at)"></span></span>
                        </template>
                      </div>
                    </div>
                    <button @click="askDelete({type:'crop', id:c.id, desc:c.type+'h · '+(c.name||'无名')+' · '+u.nickname})"
                      class="text-red-400 hover:text-red-600 text-xs font-semibold">🗑️ 删除</button>
                  </div>
                </template>
                <template x-if="filteredCropsFor(u.nickname).length === 0">
                  <div class="px-4 py-6 text-center text-sm text-slate-400">无符合筛选的作物</div>
                </template>
              </div>
            </div>
          </template>

          <template x-if="users.length === 0">
            <div class="text-center text-slate-400 py-12">还没有任何用户</div>
          </template>
        </div>
      </template>

      <!-- ============ TAB: 纪念册（全部条目，含非公开）============ -->
      <template x-if="tab === 'collections'">
        <div class="space-y-4">
          <div class="text-xs text-slate-500">管理员视图：看得到所有用户的纪念册，**包括非公开**条目</div>

          <template x-for="u in usersWithCollections" :key="u.nickname">
            <div class="bg-white rounded-xl shadow">
              <div class="px-4 py-3 border-b flex items-center justify-between flex-wrap gap-2">
                <div>
                  <span class="font-bold" x-text="u.nickname"></span>
                  <template x-if="u.banned">
                    <span class="ml-2 text-xs px-2 py-0.5 rounded bg-red-100 text-red-700">已封</span>
                  </template>
                  <span class="text-xs text-slate-500 ml-2">
                    共 <span x-text="collectionsFor(u.nickname).length"></span> 条 ·
                    其中 <span x-text="collectionsFor(u.nickname).filter(c=>c.is_public).length"></span> 公开
                  </span>
                </div>
              </div>
              <div class="divide-y">
                <template x-for="c in collectionsFor(u.nickname)" :key="c.id">
                  <div class="p-4">
                    <div class="flex items-start gap-3">
                      <span class="text-2xl" x-text="{8:'🌾',16:'🌽',32:'🫐'}[c.crop_type]"></span>
                      <div class="flex-1 min-w-0">
                        <div class="flex items-center gap-2 flex-wrap">
                          <span class="font-semibold" x-text="c.crop_name || '作物'"
                            :class="topMutationTextClass(c.mutations)"></span>
                          <span class="font-bold text-sm"
                            :class="topMutationTextClass(c.mutations) || 'text-slate-500'"
                            x-text="totalMultiplier(c.mutations) + '×'"></span>
                          <template x-if="c.is_public">
                            <span class="text-[11px] px-2 py-0.5 rounded-full bg-sky-100 text-sky-700">👥 公开</span>
                          </template>
                          <template x-if="!c.is_public">
                            <span class="text-[11px] px-2 py-0.5 rounded-full bg-slate-100 text-slate-500">🔒 私密</span>
                          </template>
                          <span class="text-[11px] text-slate-400 ml-auto" x-text="formatDateTime(c.created_at)"></span>
                        </div>
                        <div class="flex flex-wrap gap-1 mt-1">
                          <template x-for="m in sortedMutations(c.mutations)" :key="m.type + (m.name || '')">
                            <span class="text-[11px] px-2 py-0.5 rounded-full"
                              :class="mutationBadgeClass(m)"
                              x-text="mutationBadgeLabel(m)"></span>
                          </template>
                          <template x-if="!c.mutations || c.mutations.length === 0">
                            <span class="text-[11px] text-slate-400">无变异</span>
                          </template>
                        </div>
                        <template x-if="c.note">
                          <div class="text-sm text-slate-600 italic mt-1 break-words" x-text="'&quot;' + c.note + '&quot;'"></div>
                        </template>
                        <template x-if="c.image_url">
                          <img :src="c.image_url" @click="lightboxUrl = c.image_url"
                            class="w-full max-h-64 object-cover rounded mt-2 cursor-zoom-in" />
                        </template>
                      </div>
                    </div>
                    <!-- 操作按钮 -->
                    <div class="flex items-center gap-3 mt-3 text-xs justify-end">
                      <button @click="openEdit(c)"
                        class="text-sky-600 hover:text-sky-700 font-semibold">✏️ 编辑</button>
                      <button @click="togglePublic(c)"
                        class="text-amber-600 hover:text-amber-700 font-semibold"
                        x-text="c.is_public ? '🔒 改为私密' : '👥 公开'"></button>
                      <button @click="askDelete({type:'collection', id:c.id, desc:'收藏 · '+(c.crop_name||'作物')+' · '+u.nickname})"
                        class="text-red-500 hover:text-red-700 font-semibold">🗑️ 删除</button>
                    </div>
                  </div>
                </template>
                <template x-if="collectionsFor(u.nickname).length === 0">
                  <div class="px-4 py-6 text-center text-sm text-slate-400">该用户无纪念册</div>
                </template>
              </div>
            </div>
          </template>

          <template x-if="usersWithCollections.length === 0">
            <div class="text-center text-slate-400 py-12">还没有任何纪念册</div>
          </template>
        </div>
      </template>

      <!-- ============ TAB: 朋友圈（仅 is_public=true）============ -->
      <template x-if="tab === 'feed'">
        <div class="space-y-3">
          <div class="text-xs text-slate-500">管理员视图：朋友圈 = 已公开的纪念册条目。点"改为私密"等于把该条从朋友圈移除（玩家账号里仍能看到）</div>

          <template x-for="c in feedCollections" :key="c.id">
            <div class="bg-white rounded-xl shadow p-4 space-y-2">
              <div class="flex items-start gap-3">
                <span class="text-2xl" x-text="{8:'🌾',16:'🌽',32:'🫐'}[c.crop_type]"></span>
                <div class="flex-1 min-w-0">
                  <div class="flex items-center gap-2 flex-wrap">
                    <span class="font-semibold text-sm" x-text="c.user_nickname"></span>
                    <span class="text-slate-400">·</span>
                    <span class="font-semibold" :class="topMutationTextClass(c.mutations)"
                      x-text="c.crop_name || '作物'"></span>
                    <span class="font-bold text-sm"
                      :class="topMutationTextClass(c.mutations) || 'text-slate-500'"
                      x-text="totalMultiplier(c.mutations) + '×'"></span>
                    <span class="text-[11px] text-slate-400 ml-auto" x-text="formatDateTime(c.created_at)"></span>
                  </div>
                  <div class="flex flex-wrap gap-1 mt-1">
                    <template x-for="m in sortedMutations(c.mutations)" :key="m.type + (m.name || '')">
                      <span class="text-[11px] px-2 py-0.5 rounded-full"
                        :class="mutationBadgeClass(m)"
                        x-text="mutationBadgeLabel(m)"></span>
                    </template>
                    <template x-if="!c.mutations || c.mutations.length === 0">
                      <span class="text-[11px] text-slate-400">无变异</span>
                    </template>
                  </div>
                  <template x-if="c.note">
                    <div class="text-sm text-slate-600 italic mt-1 break-words" x-text="'&quot;' + c.note + '&quot;'"></div>
                  </template>
                  <template x-if="c.image_url">
                    <img :src="c.image_url" @click="lightboxUrl = c.image_url"
                      class="w-full max-h-64 object-cover rounded mt-2 cursor-zoom-in" />
                  </template>
                </div>
              </div>
              <div class="flex items-center gap-3 text-xs justify-end pt-2 border-t">
                <span class="text-slate-400">
                  ❤️ <span x-text="likeCountFor(c.id)"></span>
                  · ❓ <span x-text="questionCountFor(c.id)"></span>
                </span>
                <button @click="openEdit(c)"
                  class="text-sky-600 hover:text-sky-700 font-semibold">✏️ 编辑</button>
                <button @click="togglePublic(c)"
                  class="text-amber-600 hover:text-amber-700 font-semibold">🔒 改为私密</button>
                <button @click="askDelete({type:'collection', id:c.id, desc:'收藏 · '+(c.crop_name||'作物')+' · '+c.user_nickname})"
                  class="text-red-500 hover:text-red-700 font-semibold">🗑️ 删除</button>
              </div>
            </div>
          </template>

          <template x-if="feedCollections.length === 0">
            <div class="text-center text-slate-400 py-12">朋友圈空空如也</div>
          </template>
        </div>
      </template>

      <!-- ============ TAB: 审查 🔍（集中查所有 collections，含 UGC 内容）============ -->
      <template x-if="tab === 'review'">
        <div class="space-y-4">
          <div class="text-xs text-slate-500">
            审查视图：按时间倒序显示所有收藏条目（含非公开）。审查状态存 DB，跨设备共享。
          </div>

          <!-- 状态筛选 + 人筛选 -->
          <div class="flex items-center gap-2 text-sm flex-wrap">
            <span class="text-slate-500">状态：</span>
            <button @click="reviewFilter='all'"
              :class="reviewFilter==='all' ? 'bg-slate-800 text-white' : 'bg-white text-slate-600'"
              class="px-3 py-1 rounded-full shadow-sm"
              x-text="'全部 · ' + collections.length"></button>
            <button @click="reviewFilter='unreviewed'"
              :class="reviewFilter==='unreviewed' ? 'bg-rose-500 text-white' : 'bg-white text-slate-600'"
              class="px-3 py-1 rounded-full shadow-sm"
              x-text="'未审 · ' + unreviewedCount"></button>
            <button @click="reviewFilter='reviewed'"
              :class="reviewFilter==='reviewed' ? 'bg-emerald-600 text-white' : 'bg-white text-slate-600'"
              class="px-3 py-1 rounded-full shadow-sm"
              x-text="'已审 · ' + reviewedCount"></button>
          </div>
          <div class="flex items-center gap-2 text-sm flex-wrap">
            <span class="text-slate-500">用户：</span>
            <select x-model="reviewUserFilter" class="border rounded px-2 py-1 text-sm">
              <option value="">全部用户</option>
              <template x-for="u in usersWithCollections" :key="u.nickname">
                <option :value="u.nickname" x-text="u.nickname"></option>
              </template>
            </select>
          </div>

          <!-- 条目列表（按时间 desc）-->
          <template x-for="c in reviewItems" :key="c.id">
            <div class="bg-white rounded-xl shadow p-4 space-y-2"
              :class="isReviewed(c.id) ? 'border-l-4 border-emerald-400' : 'border-l-4 border-rose-400'">
              <div class="flex items-start gap-3">
                <span class="text-2xl" x-text="{8:'🌾',16:'🌽',32:'🫐'}[c.crop_type]"></span>
                <div class="flex-1 min-w-0">
                  <div class="flex items-center gap-2 flex-wrap">
                    <span class="font-semibold text-sm" x-text="c.user_nickname"></span>
                    <span class="text-slate-400">·</span>
                    <span class="font-semibold" :class="topMutationTextClass(c.mutations)"
                      x-text="c.crop_name || '作物'"></span>
                    <span class="font-bold text-sm"
                      :class="topMutationTextClass(c.mutations) || 'text-slate-500'"
                      x-text="totalMultiplier(c.mutations) + '×'"></span>
                    <template x-if="c.is_public">
                      <span class="text-[11px] px-2 py-0.5 rounded-full bg-sky-100 text-sky-700">👥 公开</span>
                    </template>
                    <template x-if="!c.is_public">
                      <span class="text-[11px] px-2 py-0.5 rounded-full bg-slate-100 text-slate-500">🔒 私密</span>
                    </template>
                    <template x-if="isReviewed(c.id)">
                      <span class="text-[11px] px-2 py-0.5 rounded-full bg-emerald-100 text-emerald-700"
                        x-text="'✓ ' + reviewedByFor(c.id)"></span>
                    </template>
                    <span class="text-[11px] text-slate-400 ml-auto" x-text="formatDateTime(c.created_at)"></span>
                  </div>
                  <div class="flex flex-wrap gap-1 mt-1">
                    <template x-for="m in sortedMutations(c.mutations)" :key="m.type + (m.name || '')">
                      <span class="text-[11px] px-2 py-0.5 rounded-full"
                        :class="mutationBadgeClass(m)"
                        x-text="mutationBadgeLabel(m)"></span>
                    </template>
                    <template x-if="!c.mutations || c.mutations.length === 0">
                      <span class="text-[11px] text-slate-400">无变异</span>
                    </template>
                  </div>
                  <template x-if="c.note">
                    <div class="text-sm text-slate-600 italic mt-1 break-words" x-text="'&quot;' + c.note + '&quot;'"></div>
                  </template>
                  <template x-if="c.image_url">
                    <img :src="c.image_url" @click="lightboxUrl = c.image_url"
                      class="w-full max-h-64 object-cover rounded mt-2 cursor-zoom-in" />
                  </template>
                </div>
              </div>
              <!-- 操作 -->
              <div class="flex items-center gap-3 text-xs justify-end pt-2 border-t flex-wrap">
                <template x-if="isReviewed(c.id)">
                  <button @click="toggleReview(c, false)"
                    class="text-slate-500 hover:text-slate-700 font-semibold">↩ 取消审查</button>
                </template>
                <template x-if="!isReviewed(c.id)">
                  <button @click="toggleReview(c, true)"
                    class="text-emerald-600 hover:text-emerald-700 font-semibold">✓ 标记已审</button>
                </template>
                <button @click="openEdit(c)"
                  class="text-sky-600 hover:text-sky-700 font-semibold">✏️ 编辑</button>
                <button @click="togglePublic(c)"
                  class="text-amber-600 hover:text-amber-700 font-semibold"
                  x-text="c.is_public ? '🔒 改私密' : '👥 改公开'"></button>
                <button @click="askDelete({type:'collection', id:c.id, desc:'收藏 · '+(c.crop_name||'作物')+' · '+c.user_nickname})"
                  class="text-red-500 hover:text-red-700 font-semibold">🗑️ 删除</button>
              </div>
            </div>
          </template>

          <template x-if="reviewItems.length === 0">

<script>
const ADMIN_NICKNAME = '长缨';  // 和 schema.sql is_admin() 内的硬编码对应

// SYNC-LITE: 这是 index.html computeMatTime 的"简化版"——少了 d 的 max(0,...) 和 reduction 的 min(_, T) 两处 clamp
// 仅用于后台粗略展示成熟时间。如果某天后台需要精确显示，请同步对齐 index.html 的完整版
function computeMatTime(crop) {
  const T = crop.type * HOUR_MS;
  const planted = new Date(crop.planted_at).getTime();
  const waters = (crop.water_events || []).map(t => new Date(t).getTime());
  if (waters.length === 0) return planted + T;
  let reduction = T / 12;
  for (let i = 1; i < waters.length; i++) {
    const gap = waters[i] - waters[i-1];
    const d = Math.min(1, 3 * gap / T);
    reduction += d * T / 12;
  }
  return planted + T - reduction;
}

function admin() {
  return {
    authed: false,
    loading: false,
    loginForm: { nickname: '', pin: '' },
    loginErr: '',
    me: null,                 // 管理员登录后存 { nickname, pin_hash }，给 admin RPC 用

    tab: 'crops',             // 'crops' | 'collections' | 'feed'
    cropFilter: 'all',
    users: [],
    crops: [],
    collections: [],
    likes: [],
    questions: [],
    reviews: [],                  // collection_reviews：{collection_id, reviewed_by, reviewed_at}
    lastLoadAt: null,

    // 审查 tab 筛选
    reviewFilter: 'unreviewed',   // 'all' | 'unreviewed' | 'reviewed'
    reviewUserFilter: '',         // '' = 全部用户，否则是 nickname

    // 编辑 collection 状态
    editingCollection: null,  // 当前正在编辑的条目
    editForm: { crop_name: '', mutations: [], note: '', is_public: false },
    editLoading: false,

    // 删除确认
    deleteTarget: null,       // { type, id, desc }
    deleteLoading: false,

    // 封号确认
    banTarget: null,          // { nickname, banned }（banned = 当前状态，true 表示已封想解封）
    banLoading: false,

    // 删号双重确认（输入昵称匹配才能点确认删）
    deleteUserTarget: null,         // { nickname, stats: {crops, collections, images, likes, questions, friendships, requests} }
    deleteUserConfirmInput: '',
    deleteUserLoading: false,

    // 重置 PIN
    resetPinTarget: null,           // { nickname }
    resetPinInput: '',
    resetPinLoading: false,

    // 图片预览
    lightboxUrl: null,

    // Toast
    toast: '',

    // 常量暴露给模板
    ADMIN_NICKNAME,
    MUTATION_TYPES,

    init() {
      if (!initSbClient()) {
        alert('Supabase 库没加载成功');
        return;
      }
      const saved = localStorage.getItem('wz_admin_me');
      if (saved) {
        try {
          this.me = JSON.parse(saved);
          if (this.me && this.me.nickname === ADMIN_NICKNAME) {
            this.authed = true;
            this.loadAll();
          }
        } catch {}
      }
    },

    async login() {
      this.loginErr = '';
      const nick = this.loginForm.nickname.trim();
      const pin = this.loginForm.pin.trim();
      if (nick !== ADMIN_NICKNAME) {
        this.loginErr = '非管理员';
        return;
      }
      if (!/^\d{4}$/.test(pin)) {
        this.loginErr = 'PIN 必须 4 位数字';
        return;
      }
      this.loading = true;
      try {
        const { data, error } = await sbClient.rpc('auth_login', {
          p_nickname: nick, p_pin: pin,
        });
        if (error) throw error;
        if (!data || typeof data !== 'string') {
          this.loginErr = 'PIN 错误或已被封';
          return;
        }
        this.me = { nickname: nick, pin_hash: data };
        localStorage.setItem('wz_admin_me', JSON.stringify(this.me));
        this.authed = true;
        await this.loadAll();
      } catch (e) {
        this.loginErr = '错误：' + (e.message || e);
      } finally {
        this.loading = false;
      }
    },

    logout() {
      localStorage.removeItem('wz_admin_me');
      this.authed = false;
      this.me = null;
      this.users = [];
      this.crops = [];
      this.collections = [];
      this.likes = [];
      this.questions = [];
    },

    async loadAll() {
      const [usersRes, cropsRes, collsRes, likesRes, qsRes, reviewsRes] = await Promise.all([
        sbClient.from('users').select('nickname, created_at, banned').order('created_at', { ascending: false }),
        sbClient.from('crops').select('*').order('planted_at', { ascending: false }),
        sbClient.from('collections').select('*').order('created_at', { ascending: false }),
        sbClient.from('collection_likes').select('collection_id, user_nickname'),
        sbClient.from('collection_questions').select('collection_id, user_nickname'),
        sbClient.from('collection_reviews').select('collection_id, reviewed_by, reviewed_at'),
      ]);
      this.users = usersRes.data || [];
      this.crops = cropsRes.data || [];
      this.collections = collsRes.data || [];
      this.likes = likesRes.data || [];
      this.questions = qsRes.data || [];
      this.reviews = reviewsRes.data || [];
      this.lastLoadAt = Date.now();
    },

    // ========== 排序 / 派生 ==========

    get usersSorted() {
      // 按建号时间降序（新用户在上），方便管理员追踪最近注册
      return [...this.users].sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
    },

    get usersWithCollections() {
      // 纪念册 tab：只显示有 collection 的用户（无的不占空间）
      const hasColl = new Set(this.collections.map(c => c.user_nickname));
      return this.usersSorted.filter(u => hasColl.has(u.nickname));
    },

    get publicCollections() {
      return this.collections.filter(c => c.is_public);
    },
    get feedCollections() {
      // 朋友圈 tab：is_public=true，按 created_at desc（loadAll 已 desc，filter 保序）
      return this.publicCollections;
    },

    get activeCrops() {
      const now = Date.now();
      return this.crops.filter(c => !c.harvested_at && computeMatTime(c) > now);
    },
    get matureCrops() {
      const now = Date.now();
      return this.crops.filter(c => !c.harvested_at && computeMatTime(c) <= now);
    },
    get harvestedCrops() {
      return this.crops.filter(c => c.harvested_at);
    },

    cropCountFor(nickname, type) {
      if (type === 'active') return this.activeCrops.filter(c => c.user_nickname === nickname).length;
      if (type === 'mature') return this.matureCrops.filter(c => c.user_nickname === nickname).length;
      if (type === 'harvested') return this.harvestedCrops.filter(c => c.user_nickname === nickname).length;
      return this.crops.filter(c => c.user_nickname === nickname).length;
    },

    filteredCropsFor(nickname) {
      const now = Date.now();
      let pool = this.crops.filter(c => c.user_nickname === nickname);
      if (this.cropFilter === 'active') pool = pool.filter(c => !c.harvested_at && computeMatTime(c) > now);
      if (this.cropFilter === 'mature') pool = pool.filter(c => !c.harvested_at && computeMatTime(c) <= now);
      if (this.cropFilter === 'harvested') pool = pool.filter(c => c.harvested_at);
      return pool;
    },

    collectionsFor(nickname) {
      return this.collections.filter(c => c.user_nickname === nickname);
    },

    likeCountFor(collectionId) {
      return this.likes.filter(l => l.collection_id === collectionId).length;
    },
    questionCountFor(collectionId) {
      return this.questions.filter(q => q.collection_id === collectionId).length;
    },

    // ===== 审查 tab 辅助 =====
    isReviewed(collectionId) {
      return this.reviews.some(r => r.collection_id === collectionId);
    },
    reviewedByFor(collectionId) {
      const r = this.reviews.find(x => x.collection_id === collectionId);
      return r ? r.reviewed_by : '';
    },
    get unreviewedCount() {
      const reviewedIds = new Set(this.reviews.map(r => r.collection_id));
      return this.collections.filter(c => !reviewedIds.has(c.id)).length;
    },
    get reviewedCount() {
      return this.collections.length - this.unreviewedCount;
    },
    get reviewItems() {
      const reviewedIds = new Set(this.reviews.map(r => r.collection_id));
      let pool = this.collections;
      if (this.reviewFilter === 'unreviewed') pool = pool.filter(c => !reviewedIds.has(c.id));
      else if (this.reviewFilter === 'reviewed') pool = pool.filter(c => reviewedIds.has(c.id));
      if (this.reviewUserFilter) pool = pool.filter(c => c.user_nickname === this.reviewUserFilter);
      // collections 已在 loadAll 按 created_at desc 取，保序即可
      return pool;
    },

    async toggleReview(c, reviewed) {
      try {
        const { data, error } = await sbClient.rpc('admin_review_toggle', {
          p_admin_nickname: this.me.nickname,
          p_admin_pin_hash: this.me.pin_hash,
          p_collection_id: c.id,
          p_reviewed: !!reviewed,
        });
        if (error) throw error;
        if (data?.error) throw new Error(data.error);
        // 本地立即改 reviews 数组，避免等 loadAll
        if (reviewed) {
          this.reviews.push({
            collection_id: c.id,
            reviewed_by: this.me.nickname,
            reviewed_at: new Date().toISOString(),
          });
        } else {
          this.reviews = this.reviews.filter(r => r.collection_id !== c.id);
        }
        this.showToast(reviewed ? '✓ 已标记审查' : '↩ 已取消');
      } catch (e) {
        alert('操作失败：' + (e.message || e));
      }
    },

    cropStatusLabel(c) {
      if (c.harvested_at) return '已收获';
      const now = Date.now();
      const mat = computeMatTime(c);
      if (now >= mat) return '待收获';
      return '生长中';
    },
    cropBadgeClass(c) {
      if (c.harvested_at) return 'bg-slate-100 text-slate-500';
      const now = Date.now();
      const mat = computeMatTime(c);
      if (now >= mat) return 'bg-amber-100 text-amber-700';
      return 'bg-emerald-100 text-emerald-700';
    },

    mutationBadgeClass(m) {
      return MUTATION_TYPES[m.type]?.badgeClass || '';
    },

    // ========== 编辑 collection ==========

    openEdit(c) {
      this.editingCollection = c;
      this.editForm = {
        crop_name: c.crop_name || '',
        mutations: JSON.parse(JSON.stringify(c.mutations || [])),
        note: c.note || '',
        is_public: !!c.is_public,
      };
    },

    hasMutation(type) {
      return this.editForm.mutations.some(m => m.type === type);
    },
    purpleSubname() {
      const p = this.editForm.mutations.find(m => m.type === 'purple');
      return p ? (p.name || '') : '';
    },
    toggleMutation(type) {
      const has = this.hasMutation(type);
      if (has) {
        this.editForm.mutations = this.editForm.mutations.filter(m => m.type !== type);
      } else {
        if (this.editForm.mutations.length >= 3) {
          this.showToast('最多 3 种变异');
          return;
        }
        if (type === 'purple') {
          this.editForm.mutations.push({ type: 'purple', name: MUTATION_TYPES.purple.subnames[0] });
        } else {
          this.editForm.mutations.push({ type });
        }
      }
    },
    setPurpleSub(sub) {
      this.editForm.mutations = this.editForm.mutations.map(m =>
        m.type === 'purple' ? { ...m, name: sub } : m
      );
    },

    async submitEdit() {
      if (!this.editingCollection || this.editLoading) return;
      this.editLoading = true;
      try {
        const { data, error } = await sbClient.rpc('admin_collection_write', {
          p_admin_nickname: this.me.nickname,
          p_admin_pin_hash: this.me.pin_hash,
          p_action: 'update',
          p_row_id: this.editingCollection.id,
          p_payload: {
            crop_name: (this.editForm.crop_name || '').trim(),
            mutations: this.editForm.mutations,
            note: (this.editForm.note || '').trim(),
            is_public: this.editForm.is_public,
          },
        });
        if (error) throw error;
        if (data?.error) throw new Error(data.error);
        this.showToast('✅ 已保存');
        this.editingCollection = null;
        await this.loadAll();
      } catch (e) {
        alert('保存失败：' + (e.message || e));
      } finally {
        this.editLoading = false;
      }
    },

    // ========== 切换公开 / 私密 ==========

    async togglePublic(c) {
      try {
        const { data, error } = await sbClient.rpc('admin_collection_write', {
          p_admin_nickname: this.me.nickname,
          p_admin_pin_hash: this.me.pin_hash,
          p_action: 'update',
          p_row_id: c.id,
          p_payload: { is_public: !c.is_public },
        });
        if (error) throw error;
        if (data?.error) throw new Error(data.error);
        this.showToast(c.is_public ? '🔒 已改为私密' : '👥 已公开');
        await this.loadAll();
      } catch (e) {
        alert('切换失败：' + (e.message || e));
      }
    },

    // ========== 删除（作物 / 收藏 通用）==========

    askDelete(target) {
      this.deleteTarget = target;
    },

    async confirmDelete() {
      if (!this.deleteTarget || this.deleteLoading) return;
      this.deleteLoading = true;
      const t = this.deleteTarget;
      try {
        let data, error;
        if (t.type === 'crop') {
          ({ data, error } = await sbClient.rpc('admin_crop_delete', {
            p_admin_nickname: this.me.nickname,
            p_admin_pin_hash: this.me.pin_hash,
            p_crop_id: t.id,
          }));
        } else if (t.type === 'collection') {
          // 删 collection 前先把图的 URL 留下来，删库后顺便清 Storage orphan
          const coll = this.collections.find(c => c.id === t.id);
          ({ data, error } = await sbClient.rpc('admin_collection_write', {
            p_admin_nickname: this.me.nickname,
            p_admin_pin_hash: this.me.pin_hash,
            p_action: 'delete',
            p_row_id: t.id,
            p_payload: {},
          }));
          if (!error && !data?.error && coll && coll.image_url) {
            // 静默清图（失败不抛）
            await removeImageByUrl(coll.image_url);
          }
        }
        if (error) throw error;
        if (data?.error) throw new Error(data.error);
        this.showToast('✅ 已删除');
        this.deleteTarget = null;
        await this.loadAll();
      } catch (e) {
        alert('删除失败：' + (e.message || e));
      } finally {
        this.deleteLoading = false;
      }
    },

    // ========== 封号 / 解封 ==========

    askBan(user) {
      this.banTarget = { nickname: user.nickname, banned: !!user.banned };
    },

    async confirmBan() {
      if (!this.banTarget || this.banLoading) return;
      this.banLoading = true;
      const targetBanned = !this.banTarget.banned;   // 切换
      try {
        const { data, error } = await sbClient.rpc('admin_user_ban', {
          p_admin_nickname: this.me.nickname,
          p_admin_pin_hash: this.me.pin_hash,
          p_target_nickname: this.banTarget.nickname,
          p_banned: targetBanned,
        });
        if (error) throw error;
        if (data?.error) throw new Error(data.error);
        this.showToast(targetBanned ? '🚫 已封号' : '🔓 已解封');
        this.banTarget = null;
        await this.loadAll();
      } catch (e) {
        alert('操作失败：' + (e.message || e));
      } finally {
        this.banLoading = false;
      }
    },

    // ========== 删号（危险操作）==========

    askDeleteUser(user) {
      const nick = user.nickname;
      // 从本地 data 聚合该用户数据规模（预览给管理员看）
      const userCrops = this.crops.filter(c => c.user_nickname === nick);
      const userColls = this.collections.filter(c => c.user_nickname === nick);
      const userImages = userColls.filter(c => c.image_url).length;
      const userLikes = this.likes.filter(l => l.user_nickname === nick).length;
      const userQs = this.questions.filter(q => q.user_nickname === nick).length;
      // friendships / requests 数据未载入，先展示预估（实际删号时后端不关心前端预估）
      this.deleteUserTarget = {
        nickname: nick,
        stats: {
          crops: userCrops.length,
          collections: userColls.length,
          images: userImages,
          likes: userLikes,
          questions: userQs,
          friendships: '?',
          requests: '?',
        },
      };
      this.deleteUserConfirmInput = '';
    },

    cancelDeleteUser() {
      this.deleteUserTarget = null;
      this.deleteUserConfirmInput = '';
    },

    async confirmDeleteUser() {
      if (!this.deleteUserTarget || this.deleteUserLoading) return;
      // 双重保险：前端也校验一次输入值匹配昵称
      if (this.deleteUserConfirmInput !== this.deleteUserTarget.nickname) {
        this.showToast('请输入正确的昵称确认');
        return;
      }
      this.deleteUserLoading = true;
      const nick = this.deleteUserTarget.nickname;
      try {
        const { data, error } = await sbClient.rpc('admin_user_delete', {
          p_admin_nickname: this.me.nickname,
          p_admin_pin_hash: this.me.pin_hash,
          p_target_nickname: nick,
        });
        if (error) throw error;
        if (data?.error) throw new Error(data.error);
        // RPC 返回 { ok, image_urls: [...] }；前端逐个清 Storage orphan 图
        const urls = (data && data.image_urls) || [];
        if (urls.length > 0) {
          // 静默清理，失败也不 block
          await Promise.all(urls.map(u => removeImageByUrl(u).catch(() => {})));
        }
        this.showToast(`💣 已删除用户 ${nick}（含 ${urls.length} 张图片）`);
        this.deleteUserTarget = null;
        this.deleteUserConfirmInput = '';
        await this.loadAll();
      } catch (e) {
        alert('删号失败：' + (e.message || e));
      } finally {
        this.deleteUserLoading = false;
      }
    },

    // ========== 重置 PIN ==========

    askResetPin(user) {
      this.resetPinTarget = { nickname: user.nickname };
      this.resetPinInput = '';
    },

    async confirmResetPin() {
      if (!this.resetPinTarget || this.resetPinLoading) return;
      if (!/^[0-9]{4}$/.test(this.resetPinInput)) {
        this.showToast('PIN 必须是 4 位数字');
        return;
      }
      this.resetPinLoading = true;
      const nick = this.resetPinTarget.nickname;
      const pin = this.resetPinInput;
      try {
        const { data, error } = await sbClient.rpc('admin_user_reset_pin', {
          p_admin_nickname: this.me.nickname,
          p_admin_pin_hash: this.me.pin_hash,
          p_target_nickname: nick,
          p_new_pin: pin,
        });
        if (error) throw error;
        if (data?.error) throw new Error(data.error);
        alert(`✅ 已重置 ${nick} 的 PIN 为 ${pin}\n\n请口头告诉用户，让 TA 下次用这个 PIN 登录。`);
        this.resetPinTarget = null;
        this.resetPinInput = '';
      } catch (e) {
        alert('重置失败：' + (e.message || e));
      } finally {
        this.resetPinLoading = false;
      }
    },

    // ========== 杂项 ==========

    showToast(msg) {
      this.toast = msg;
      setTimeout(() => { this.toast = ''; }, 2000);
    },

    // pass-through 给 Alpine 模板用
    formatDateTime(ts) { return formatDateTime(ts); },
    totalMultiplier(ms) { return totalMultiplier(ms); },
    mutationBadgeLabel(m) { return mutationBadgeLabel(m); },
    topMutationTextClass(ms) { return topMutationTextClass(ms); },
    sortedMutations(ms) { return sortedMutations(ms); },
  };
}
</script>
</body>
</html>
